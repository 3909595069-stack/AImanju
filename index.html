<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 漫剧入门完全指南 — 从零到第一部AI短剧</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Sans+SC:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ============================================
   TOKEN SYSTEM
   ============================================ */
:root {
  --bg-deep: #0d0d1a; --bg-card: #151528; --bg-elevated: #1c1c38;
  --bg-highlight: #222250; --text-primary: #e8e6f0; --text-secondary: #a09cb8;
  --text-muted: #6b6680; --accent: #e94560; --accent-glow: #ff6b81;
  --warm-gold: #f0a500; --cool-blue: #4a9eff; --success: #2ed573;
  --warning: #ffa502; --border: #2a2a45; --border-light: #35355a;
  --film-perf: #3a3a5c; --radius-sm:6px; --radius-md:12px; --radius-lg:20px;
  --shadow-card: 0 4px 24px rgba(0,0,0,0.3); --shadow-glow: 0 0 40px rgba(233,69,96,0.15);
  --font-display: 'Ma Shan Zheng',cursive; --font-body: 'Noto Sans SC',sans-serif;
  --font-mono: 'JetBrains Mono',monospace; --content-width: 860px;
  --sidebar-width: 200px; --topbar-height: 52px;
  --transition: 0.25s cubic-bezier(0.4,0,0.2,1);
}
[data-theme="light"] {
  --bg-deep: #f5f3ee; --bg-card: #ffffff; --bg-elevated: #faf8f5;
  --bg-highlight: #fef3f2; --text-primary: #1a1a2e; --text-secondary: #5a5570;
  --text-muted: #8b86a0; --accent: #d63447; --accent-glow: #e94560;
  --warm-gold: #c78500; --cool-blue: #3366cc; --border: #e0dcd5;
  --border-light: #eee9e0; --film-perf: #d5d0c8;
  --shadow-card: 0 4px 24px rgba(0,0,0,0.06); --shadow-glow: 0 0 40px rgba(233,69,96,0.08);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;font-size:16px}
body{
  font-family:var(--font-body);background:var(--bg-deep);color:var(--text-primary);
  line-height:1.75;-webkit-font-smoothing:antialiased;
  transition:background var(--transition),color var(--transition);overflow-x:hidden;
}

/* ============================================
   TOP NAV BAR
   ============================================ */
.topbar{
  position:fixed;top:0;left:0;right:0;height:var(--topbar-height);
  background:var(--bg-card);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 16px;z-index:1000;
  box-shadow:0 1px 12px rgba(0,0,0,0.2);
}
.topbar .logo{
  font-family:var(--font-display);font-size:1.3rem;color:var(--accent);
  white-space:nowrap;line-height:1;
}
.topbar .step-indicator{
  margin-left:16px;font-size:0.82rem;color:var(--text-muted);
  display:flex;align-items:center;gap:8px;
}
.topbar .step-indicator .current-step{color:var(--accent);font-weight:600}
.topbar .nav-arrows{display:flex;gap:4px;margin-left:12px}
.topbar .nav-arrows button{
  background:var(--bg-elevated);border:1px solid var(--border);color:var(--text-secondary);
  width:30px;height:30px;border-radius:var(--radius-sm);cursor:pointer;
  font-size:0.9rem;transition:all var(--transition);display:flex;align-items:center;justify-content:center;
}
.topbar .nav-arrows button:hover{color:var(--accent);border-color:var(--accent)}
.topbar .nav-arrows button:disabled{opacity:0.3;cursor:not-allowed}
.topbar-spacer{flex:1}
.topbar .topbar-actions{display:flex;gap:6px;align-items:center}
.topbar .theme-btn{
  background:var(--bg-elevated);border:1px solid var(--border);color:var(--text-secondary);
  width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:1rem;
  display:flex;align-items:center;justify-content:center;transition:all var(--transition);
}
.topbar .theme-btn:hover{color:var(--warm-gold);border-color:var(--warm-gold)}
.topbar .menu-btn{
  display:none;background:var(--accent);color:#fff;border:none;
  padding:6px 14px;border-radius:var(--radius-sm);cursor:pointer;
  font-family:var(--font-body);font-size:0.82rem;font-weight:500;
}

/* ============================================
   SIDEBAR
   ============================================ */
.sidebar{
  position:fixed;left:0;top:var(--topbar-height);bottom:0;
  width:var(--sidebar-width);background:var(--bg-card);
  border-right:1px solid var(--border);z-index:900;overflow-y:auto;
  padding:12px 0;transition:transform var(--transition);
}
.sidebar::-webkit-scrollbar{width:3px}
.sidebar::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.sidebar-section-title{
  font-size:0.7rem;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;
  color:var(--text-muted);padding:8px 16px 4px;margin-top:8px;
}
.sidebar a{
  display:flex;align-items:center;gap:8px;text-decoration:none;
  color:var(--text-secondary);font-size:0.82rem;padding:7px 16px;
  transition:all var(--transition);border-left:2px solid transparent;
  line-height:1.3;
}
.sidebar a .step-num{font-family:var(--font-mono);font-size:0.7rem;color:var(--text-muted);min-width:20px}
.sidebar a:hover{color:var(--text-primary);background:rgba(233,69,96,0.04)}
.sidebar a.active{
  color:var(--accent-glow);background:rgba(233,69,96,0.06);
  border-left-color:var(--accent);font-weight:500;
}
.sidebar a.active .step-num{color:var(--accent)}
.sidebar-overlay{display:none}

@media(max-width:900px){
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0);box-shadow:4px 0 24px rgba(0,0,0,0.4)}
  .sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:899}
  .sidebar-overlay.open{display:block}
  .topbar .menu-btn{display:block}
}

/* ============================================
   MAIN CONTENT
   ============================================ */
.main-wrap{
  margin-left:var(--sidebar-width);margin-top:var(--topbar-height);
  min-height:calc(100vh - var(--topbar-height));
  transition:margin var(--transition);
}
@media(max-width:900px){.main-wrap{margin-left:0}}
.main-inner{max-width:var(--content-width);margin:0 auto;padding:32px 24px 120px}

/* Page transition */
.page-content{animation:fadeSlideIn 0.3s ease-out}
@keyframes fadeSlideIn{
  from{opacity:0;transform:translateY(16px)}
  to{opacity:1;transform:translateY(0)}
}

/* Step hero header */
.step-hero{
  margin-bottom:32px;padding-bottom:24px;
  border-bottom:1px solid var(--border);
}
.step-hero .step-number{
  font-family:var(--font-display);font-size:3rem;color:var(--accent);
  line-height:1;margin-bottom:4px;opacity:0.7;
}
.step-hero .step-title{font-size:1.5rem;font-weight:600;margin-bottom:4px}
.step-hero .step-subtitle{font-size:0.9rem;color:var(--text-muted);font-weight:300}

/* ============================================
   SHARED COMPONENTS (reuse from v1)
   ============================================ */
.explain-block{margin:16px 0;padding:16px 20px;border-radius:var(--radius-md);border-left:3px solid var(--border);background:var(--bg-elevated)}
.explain-block.what{border-left-color:var(--cool-blue)}
.explain-block.why{border-left-color:var(--warm-gold)}
.explain-block.how{border-left-color:var(--success)}
.explain-block h4{font-size:0.85rem;font-weight:600;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.explain-block.what h4{color:var(--cool-blue)}
.explain-block.why h4{color:var(--warm-gold)}
.explain-block.how h4{color:var(--success)}
.explain-block p,.explain-block li{font-size:0.9rem;color:var(--text-secondary)}
.data-table-wrapper{overflow-x:auto;margin:16px 0;border-radius:var(--radius-md);border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:0.85rem}
thead th{background:var(--bg-elevated);padding:10px 14px;text-align:left;font-weight:600;color:var(--text-primary);white-space:nowrap;border-bottom:2px solid var(--border);font-size:0.8rem}
tbody td{padding:9px 14px;border-bottom:1px solid var(--border);color:var(--text-secondary);vertical-align:top}
tbody tr:hover td{background:rgba(233,69,96,0.03)}
tbody tr:last-child td{border-bottom:none}
.prompt-block{position:relative;margin:16px 0;background:#0a0a16;border:2px solid var(--film-perf);border-radius:var(--radius-md);overflow:hidden}
.prompt-header{display:flex;justify-content:space-between;align-items:center;padding:8px 16px;background:var(--bg-elevated);border-bottom:1px solid var(--border);font-size:0.78rem;color:var(--text-muted)}
.copy-btn{background:transparent;border:1px solid var(--border);color:var(--text-secondary);padding:4px 12px;border-radius:var(--radius-sm);cursor:pointer;font-size:0.75rem;font-family:var(--font-body);transition:all var(--transition)}
.copy-btn:hover{border-color:var(--accent);color:var(--accent)}
.copy-btn.copied{background:var(--success);border-color:var(--success);color:#fff}
.prompt-content{padding:14px 18px;font-family:var(--font-mono);font-size:0.8rem;line-height:1.6;color:var(--text-primary);overflow-x:auto;white-space:pre-wrap;word-break:break-word}
code{font-family:var(--font-mono);font-size:0.85em;background:var(--bg-elevated);padding:2px 6px;border-radius:3px;color:var(--accent-glow);border:1px solid var(--border)}
.tip-card{margin:14px 0;padding:14px 18px;border-radius:var(--radius-md);font-size:0.88rem;display:flex;gap:10px;align-items:flex-start}
.tip-card.tip{background:rgba(74,158,255,0.08);border:1px solid rgba(74,158,255,0.2);color:var(--cool-blue)}
.tip-card.warning{background:rgba(255,165,2,0.08);border:1px solid rgba(255,165,2,0.2);color:var(--warning)}
.tip-card.success{background:rgba(46,213,115,0.08);border:1px solid rgba(46,213,115,0.2);color:var(--success)}
.tip-card.danger{background:rgba(233,69,96,0.08);border:1px solid rgba(233,69,96,0.2);color:var(--accent)}
.tip-icon{font-size:1.1rem;flex-shrink:0;margin-top:1px}
.golden-box{background:linear-gradient(135deg,rgba(240,165,0,0.06),rgba(233,69,96,0.04));border:1px solid rgba(240,165,0,0.2);border-radius:var(--radius-md);padding:18px 22px;margin:16px 0;text-align:center}
.golden-box strong{color:var(--warm-gold);font-family:var(--font-display);font-size:1.4rem}

/* ============================================
   BOTTOM NAV
   ============================================ */
.bottom-nav{
  position:fixed;bottom:0;left:var(--sidebar-width);right:0;
  background:var(--bg-card);border-top:1px solid var(--border);
  padding:10px 24px;display:flex;justify-content:space-between;
  align-items:center;z-index:800;transition:left var(--transition);
}
@media(max-width:900px){.bottom-nav{left:0}}
.bottom-nav button{
  background:var(--bg-elevated);border:1px solid var(--border);color:var(--text-secondary);
  padding:8px 20px;border-radius:var(--radius-sm);cursor:pointer;
  font-family:var(--font-body);font-size:0.85rem;transition:all var(--transition);
  display:flex;align-items:center;gap:6px;
}
.bottom-nav button:hover:not(:disabled){color:var(--accent);border-color:var(--accent)}
.bottom-nav button:disabled{opacity:0.3;cursor:not-allowed}
.bottom-nav .step-dots{display:flex;gap:6px}
.bottom-nav .step-dots .dot{
  width:8px;height:8px;border-radius:50%;background:var(--border);
  transition:all var(--transition);cursor:pointer;
}
.bottom-nav .step-dots .dot.active{background:var(--accent);width:20px;border-radius:4px}

/* ============================================
   BACK TO TOP & FOOTER
   ============================================ */
.back-to-top{
  position:fixed;bottom:80px;right:24px;z-index:700;
  width:40px;height:40px;border-radius:50%;background:var(--accent);
  color:#fff;border:none;cursor:pointer;font-size:1.1rem;
  display:flex;align-items:center;justify-content:center;
  opacity:0;transform:translateY(20px);transition:all var(--transition);
  box-shadow:0 4px 16px rgba(233,69,96,0.3);pointer-events:none;
}
.back-to-top.visible{opacity:1;transform:translateY(0);pointer-events:auto}
.back-to-top:hover{background:var(--accent-glow)}

/* ============================================
   RESPONSIVE
   ============================================ */
@media(max-width:600px){
  .step-hero .step-number{font-size:2.2rem}
  .step-hero .step-title{font-size:1.3rem}
  .topbar .logo{font-size:1.1rem}
  .topbar .step-indicator{display:none}
  .main-inner{padding:20px 16px 100px}
  table{font-size:0.76rem}
  thead th,tbody td{padding:7px 9px}
}
</style>
</head>
<body>

<!-- TOP BAR -->
<header class="topbar">
  <span class="logo">🎬 AI漫剧指南</span>
  <div class="step-indicator"><span class="current-step" id="currentStepLabel">第1步</span><span id="currentStepTitle"></span></div>
  <div class="nav-arrows">
    <button id="prevBtn" title="上一步 (←键)">◀</button>
    <button id="nextBtn" title="下一步 (→键)">▶</button>
  </div>
  <div class="topbar-spacer"></div>
  <div class="topbar-actions">
    <button class="theme-btn" id="themeBtn" title="切换亮/暗模式">🌙</button>
    <button class="menu-btn" id="menuBtn">☰ 目录</button>
  </div>
</header>

<!-- SIDEBAR -->
<div class="sidebar-overlay" id="sidebarOverlay"></div>
<nav class="sidebar" id="sidebar"></nav>

<!-- MAIN -->
<div class="main-wrap">
  <div class="main-inner" id="mainContent"></div>
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <button id="bottomPrev" disabled>◀ 上一步</button>
  <div class="step-dots" id="stepDots"></div>
  <button id="bottomNext">下一步 ▶</button>
</nav>

<button class="back-to-top" id="backToTop">↑</button>

<script>
/* ============================================
   DATA: Sidebar Structure
   ============================================ */
const SIDEBAR_ITEMS = [
  { id:'step1',group:'教程',label:'写出好故事', num:'01', icon:'✍️' },
  { id:'step2',group:'教程',label:'角色"身份证"', num:'02', icon:'👤' },
  { id:'step3',group:'教程',label:'环境不乱变', num:'03', icon:'🏠' },
  { id:'step4',group:'教程',label:'从写手变导演', num:'04', icon:'🎬' },
  { id:'step5',group:'教程',label:'文字变成画面', num:'05', icon:'🖼️' },
  { id:'step6',group:'教程',label:'画面动起来', num:'06', icon:'🎥' },
  { id:'step7',group:'教程',label:'让剧有声音', num:'07', icon:'🎙️' },
  { id:'step8',group:'教程',label:'拼成一部剧', num:'08', icon:'✂️' },
  { id:'step9',group:'教程',label:'让作品被看到', num:'09', icon:'🚀' },
  { id:'tools',group:'参考',label:'完整工具清单', num:'🧰', icon:'' },
  { id:'bugs',group:'参考',label:'终极避坑大全', num:'🐛', icon:'' },
  { id:'resources',group:'参考',label:'推荐学习资源', num:'📖', icon:'' },
];

/* ============================================
   BUILD SIDEBAR DOM
   ============================================ */
function buildSidebar(){
  const sb = document.getElementById('sidebar');
  let html=''; let lastGroup='';
  SIDEBAR_ITEMS.forEach((item,i)=>{
    if(item.group!==lastGroup){
      html+=`<div class="sidebar-section-title">${item.group}</div>`;
      lastGroup=item.group;
    }
    html+=`<a href="#${item.id}" data-id="${item.id}" data-index="${i}"><span class="step-num">${item.num}</span>${item.label}</a>`;
  });
  sb.innerHTML=html;
}
buildSidebar();

/* Render step dots */
function buildDots(){
  const dots = document.getElementById('stepDots');
  dots.innerHTML = SIDEBAR_ITEMS.map((s,i)=>`<span class="dot" data-index="${i}" title="${s.num} ${s.label}" onclick="navigateTo('${s.id}')"></span>`).join('');
}
buildDots();

/* ============================================
   STEP CONTENT DATA
   ============================================ */
const STEPS = {};

// -- Step 1: 剧本创作 (MASSIVELY EXPANDED) --
STEPS['step1'] = {
  number:'01', icon:'✍️', title:'剧本创作 — 先把故事写出来', label:'写出好故事',
  html: `
<div class="step-hero">
  <div class="step-number">✍️ 01</div>
  <div class="step-title">剧本创作 — 先把故事写出来</div>
  <div class="step-subtitle">没有剧本，后面全是瞎搞。剧本决定了你需要什么角色、什么场景、多少个镜头。这是整个AI漫剧的"地基"。</div>
</div>

<div class="explain-block what">
  <h4>🔍 这一步到底在做什么？</h4>
  <p>就是写出你这部短剧的<strong>故事内容</strong>——谁在什么情况下做了什么，发生了什么转折。一集 AI 漫剧通常 <strong>1-2 分钟</strong>，约 <strong>200-400 字</strong>。这个字数听起来很少，但浓缩才是精华——你要在 60-90 秒内把观众抓住、带他们经历一场情绪过山车、最后留一个悬念让他们想看下一集。</p>
</div>

<div class="explain-block why">
  <h4>💡 为什么先做这一步？</h4>
  <p>剧本就像盖房子的图纸——没有图纸，砖往哪砌？剧本决定了后面所有步骤的方向：你需要设计什么角色、准备什么场景、写多少分镜。一部 AI 漫剧能不能火，<strong>80% 取决于剧本质量</strong>——再精美的画面也救不了一个无聊的故事。</p>
</div>

<hr style="border:none;border-top:1px solid var(--border);margin:32px 0;">

<h2 style="font-size:1.15rem;margin-bottom:16px;">📊 模块一：选题定位 — 做什么题材最容易火？</h2>

<p style="font-size:0.9rem;color:var(--text-secondary);margin-bottom:12px;">选题是剧本创作的第一步，也是最容易被跳过的关键决策。好的选题自带流量，糟糕的选题做出来也没人看。</p>

<div class="data-table-wrapper">
<table>
<thead><tr><th>题材</th><th>热度</th><th>难度</th><th>适合新手？</th><th>受众</th></tr></thead>
<tbody>
<tr><td><strong>重生逆袭</strong></td><td>🔥🔥🔥🔥🔥</td><td>⭐⭐</td><td>✅ 非常适合</td><td>全年龄段，女频为主</td></tr>
<tr><td><strong>玄幻修仙</strong></td><td>🔥🔥🔥🔥</td><td>⭐⭐⭐</td><td>✅ 适合</td><td>男频为主</td></tr>
<tr><td><strong>都市甜宠</strong></td><td>🔥🔥🔥🔥🔥</td><td>⭐⭐</td><td>✅ 非常适合</td><td>女频为主</td></tr>
<tr><td><strong>悬疑恐怖</strong></td><td>🔥🔥🔥🔥</td><td>⭐⭐⭐⭐</td><td>⚠️ 较难</td><td>男女均衡</td></tr>
<tr><td><strong>末世生存</strong></td><td>🔥🔥🔥🔥</td><td>⭐⭐⭐</td><td>✅ 适合</td><td>男频为主</td></tr>
<tr><td><strong>霸总/豪门</strong></td><td>🔥🔥🔥🔥🔥</td><td>⭐⭐</td><td>✅ 非常适合</td><td>女频为主</td></tr>
<tr><td><strong>战神/赘婿</strong></td><td>🔥🔥🔥🔥</td><td>⭐⭐</td><td>✅ 适合</td><td>男频、下沉市场</td></tr>
<tr><td><strong>宫斗复仇</strong></td><td>🔥🔥🔥🔥</td><td>⭐⭐⭐</td><td>⚠️ 中等</td><td>女频为主</td></tr>
</tbody>
</table>
</div>

<div class="tip-card success">
  <span class="tip-icon">✅</span>
  <span><strong>新手选材建议：</strong>优先选「重生逆袭」或「都市甜宠」——这两个题材受众最广、成本最低、故事结构最成熟。避开科幻和悬疑，因为前者场景难生成、后者对叙事节奏要求极高。</span>
</div>

<div class="explain-block how" style="margin-top:16px;">
  <h4>🛠️ 怎么验证你的选题好不好？</h4>
  <p><strong>三步验证法：</strong></p>
  <p>① 去抖音/小红书搜"AI漫剧"，按"最热"排序，看近30天有哪些爆款<br>
  ② 把这些爆款的题材、人设、结构列出来，找共同点<br>
  ③ 在你选定的题材里，加一个<strong>独特的细节</strong>做差异化（比如"重生"太常见了，但"重生回高考前一天发现自己作弊被抓"就能让人好奇）</p>
</div>

<hr style="border:none;border-top:1px solid var(--border);margin:32px 0;">

<h2 style="font-size:1.15rem;margin-bottom:16px;">📖 模块二：叙事结构 — 好故事是有公式的</h2>

<p style="font-size:0.9rem;color:var(--text-secondary);margin-bottom:12px;">你以为好故事靠灵感？其实全世界的好故事都遵循着几种基本结构。掌握了结构，你就能稳定地产出高质量的剧本。</p>

<h4 style="font-size:0.95rem;margin:16px 0 8px;">结构A：微戏剧弧线 (适合 30-60 秒超短剧)</h4>
<div class="data-table-wrapper">
<table>
<thead><tr><th>阶段</th><th>时间</th><th>功能</th><th>举例</th></tr></thead>
<tbody>
<tr><td><strong>钩子 Hook</strong></td><td>0–3s</td><td>瞬间抓住注意力</td><td>"这是第三十次，她从噩梦中惊醒。"</td></tr>
<tr><td><strong>铺垫 Build-up</strong></td><td>3–8s</td><td>快速呈现冲突</td><td>女主发现自己被困在同一天</td></tr>
<tr><td><strong>高潮 Climax</strong></td><td>8–12s</td><td>情感/视觉冲击最强</td><td>她在镜子里看到了另一个自己</td></tr>
<tr><td><strong>收尾 Resolution</strong></td><td>12–15s</td><td>快速收束，留悬念</td><td>"明天，她要改变这一切。"</td></tr>
</tbody>
</table>
</div>

<h4 style="font-size:0.95rem;margin:16px 0 8px;">结构B：好莱坞三拍 (Hook → Build → Payoff，通用结构)</h4>
<div class="data-table-wrapper">
<table>
<thead><tr><th>节拍</th><th>在做什么</th><th>常见错误</th></tr></thead>
<tbody>
<tr><td><strong>Hook</strong></td><td>告诉观众"为什么值得看"，承诺结果/制造张力/引发好奇</td><td>在Hook阶段做"自我介绍"——观众不想听你是谁，他们想知道"跟我有什么关系"</td></tr>
<tr><td><strong>Build</strong></td><td>一次只发展一个想法，按清晰逻辑推进，每30秒一个转折</td><td>信息过载——同时塞入人物背景+世界观+当前事件，观众跟丢</td></tr>
<tr><td><strong>Payoff</strong></td><td>兑现Hook中的承诺，结尾有闭环感或明确下一步</td><td>结尾太仓促或太模糊——观众觉得"就这？"</td></tr>
</tbody>
</table>
</div>

<h4 style="font-size:0.95rem;margin:16px 0 8px;">结构C：经典三幕剧 (适合 1-2 分钟短剧)</h4>
<div class="data-table-wrapper">
<table>
<thead><tr><th>幕</th><th>功能</th><th>在你的剧里怎么做</th></tr></thead>
<tbody>
<tr><td><strong>第一幕·建置</strong></td><td>设定世界、引入主角、建立冲突种子</td><td>前15秒：揭示主角身份+处境+今天的"反常"</td></tr>
<tr><td><strong>第二幕·对抗</strong></td><td>障碍升级、转折、情感加深</td><td>中间30-40秒：冲突越来越严重，主角被逼到墙角</td></tr>
<tr><td><strong>第三幕·解决</strong></td><td>高潮对决、人物成长、情感回报</td><td>最后15-20秒：揭示真相/反转/主角的命运</td></tr>
</tbody>
</table>
</div>

<div class="golden-box">
  <strong>黄金结构口诀</strong><br>
  <span style="font-size:0.95rem;color:var(--text-secondary);">
  钩子开头(0-3s) → 冲突升级(3-30s) → 反转高潮(30-50s) → 留白结尾(50-60s)<br>
  <strong>每30秒必须有一个情绪转折，否则观众就划走了。</strong>
  </span>
</div>

<hr style="border:none;border-top:1px solid var(--border);margin:32px 0;">

<h2 style="font-size:1.15rem;margin-bottom:16px;">🪝 模块三：钩子设计 — 前3秒定生死</h2>

<p style="font-size:0.9rem;color:var(--text-secondary);margin-bottom:12px;">抖音/快手的视频流里，用户平均只给你 <strong>0.5-1秒</strong> 来决定要不要停下滑动。钩子不强，后面写得再好也没人看到。</p>

<h4 style="font-size:0.95rem;margin:16px 0 8px;">五种钩子策略（附实际例子）</h4>

<div class="data-table-wrapper">
<table>
<thead><tr><th>策略</th><th>原理</th><th>AI漫剧示例</th></tr></thead>
<tbody>
<tr><td><strong>🎯 模式中断</strong></td><td>出人意料的画面/声音瞬间打破观众预期</td><td>画面从一个温馨的婚礼急转到新娘突然消失，空中只剩一件婚纱</td></tr>
<tr><td><strong>❓ 问题钩子</strong></td><td>直接抛出观众关心的问题</td><td>"如果你重生回高考当天，但发现自己已经三年没碰过书本，你会怎么办？"</td></tr>
<tr><td><strong>👀 结果预告</strong></td><td>先展示惊人结果，引发好奇心</td><td>画面先展示一片废墟中唯一活着的人，然后切回"三天前"</td></tr>
<tr><td><strong>💥 大胆断言</strong></td><td>反常识、引人争议的声明</td><td>"所有人都以为魔王是坏人，但没有人知道，他才是拯救世界的那个人。"</td></tr>
<tr><td><strong>📖 故事开场</strong></td><td>直接在冲突中开始，无铺垫</td><td>"分手吧。"一只茶杯摔碎在地上，男主的笑容僵在脸上。</td></tr>
</tbody>
</table>
</div>

<div class="tip-card warning">
  <span class="tip-icon">⚠️</span>
  <span><strong>钩子最好由你亲手写，不要依赖AI！</strong>AI 天生趋向"平均"，写不出尖锐的钩子。最扎心、最意外、最能让人停下来的那句话/那个画面——必须来自人脑的直觉。</span>
</div>

<hr style="border:none;border-top:1px solid var(--border);margin:32px 0;">

<h2 style="font-size:1.15rem;margin-bottom:16px;">⚔️ 模块四：冲突设计 — 没有冲突就没有故事</h2>

<p style="font-size:0.9rem;color:var(--text-secondary);margin-bottom:12px;">冲突是故事的发动机。AI 漫剧的每一秒都应该有冲突在推进——不是非要打打杀杀，而是"角色想要什么，但有什么在阻碍他"。</p>

<h4 style="font-size:0.95rem;margin:16px 0 8px;">冲突的四种类别</h4>
<div class="data-table-wrapper">
<table>
<thead><tr><th>类型</th><th>解释</th><th>AI漫剧场景</th></tr></thead>
<tbody>
<tr><td><strong>角色 vs 角色</strong></td><td>两个人的目标对立</td><td>男女主误会、正反派斗智、情敌争宠</td></tr>
<tr><td><strong>角色 vs 环境</strong></td><td>外部世界制造障碍</td><td>末日生存、天灾、社会规则不公</td></tr>
<tr><td><strong>角色 vs 自身</strong></td><td>内心挣扎、道德困境</td><td>发现了真相但不知道该不该说、复仇还是宽恕</td></tr>
<tr><td><strong>角色 vs 社会/系统</strong></td><td>对抗更大的力量</td><td>打破规则、挑战权威、"小人物对抗大系统"</td></tr>
</tbody>
</table>
</div>

<h4 style="font-size:0.95rem;margin:16px 0 8px;">冲突升级五步原则</h4>
<ol style="padding-left:20px;color:var(--text-secondary);font-size:0.9rem;line-height:2.2;">
  <li>明确主角目标（他想要什么？）→ 创建障碍</li>
  <li>构建对抗力量（谁/什么阻止他？）→ 让阻碍越来越强</li>
  <li>设置转折点：主角以为解决了→发现更大的问题</li>
  <li>情感冲突 + 利益冲突 + 价值观冲突 叠加</li>
  <li>每一拍都比前一拍更紧张——<strong>永远不要让观众松口气</strong></li>
</ol>

<hr style="border:none;border-top:1px solid var(--border);margin:32px 0;">

<h2 style="font-size:1.15rem;margin-bottom:16px;">🔄 模块五：反转设计 — 让观众"卧槽"的一刻</h2>

<p style="font-size:0.9rem;color:var(--text-secondary);margin-bottom:12px;">反转是AI漫剧最有力的武器。一个好的反转会让观众反复重看、主动分享、在评论区讨论。</p>

<div class="data-table-wrapper">
<table>
<thead><tr><th>反转类型</th><th>怎么做</th><th>AI漫剧示例</th></tr></thead>
<tbody>
<tr><td><strong>身份反转</strong></td><td>角色的真实身份被揭露</td><td>一直帮助女主的温暖前辈，其实是幕后反派</td></tr>
<tr><td><strong>真相反转</strong></td><td>观众/主角以为的真相被颠覆</td><td>以为自己被抛弃了的女主，发现对方其实在暗中保护了她十年</td></tr>
<tr><td><strong>动机反转</strong></td><td>角色行动的真正原因被揭露</td><td>表面上霸道的老板，其实是在用严厉的方式培养女王接班</td></tr>
<tr><td><strong>处境反转</strong></td><td>权力/命运关系瞬间逆转</td><td>原本高高在上的反派突然跪下求饶，弱者变成了强者</td></tr>
<tr><td><strong>因果反转</strong></td><td>恶作剧反弹到始作俑者身上</td><td>下毒的人自己中毒、设陷阱的人自己掉进去</td></tr>
</tbody>
</table>
</div>

<div class="tip-card tip">
  <span class="tip-icon">🎯</span>
  <span><strong>反转的黄金原则：</strong>① 反转必须在前文有伏笔（观众回看时能发现线索）；② 反转应该改变观众对整个故事的理解；③ 每个剧本至少保留<strong>1-2个关键反转点</strong>。</span>
</div>

<hr style="border:none;border-top:1px solid var(--border);margin:32px 0;">

<h2 style="font-size:1.15rem;margin-bottom:16px;">🤖 模块六：用 AI 写剧本 — 提示词精讲</h2>

<p style="font-size:0.9rem;color:var(--text-secondary);margin-bottom:12px;">大多数人让 AI 写剧本时只输入了一句话："给我写一个古装AI漫剧剧本"。然后抱怨 AI 写得太烂。问题在于——<strong>你没有教 AI 什么是好剧本</strong>。下面这个五步提示词框架，是你需要教给 AI 的所有东西。</p>

<div class="prompt-block">
  <div class="prompt-header"><span>🤖 剧本生成 — 完整五步提示词（复制到 DeepSeek/ChatGPT）</span><button class="copy-btn" onclick="copyPrompt(this)">📋 复制</button></div>
  <div class="prompt-content">【第一步：角色定义】
你是一位专业短视频编剧，擅长打造高留存率的开篇钩子、设计紧凑的冲突升级、安排意想不到的情节反转、创作自然的口语化对白。

【第二步：核心信息】
- 题材：[重生逆袭 / 玄幻修仙 / 都市甜宠 / 末世生存 / 霸总]
- 时长：约60-90秒
- 平台：抖音（竖屏9:16）
- 目标观众：[例如：18-35岁女性]
- 核心情感基调：[爽 / 虐 / 甜 / 燃 / 悬疑]

【第三步：结构要求】
请严格按照以下结构生成剧本，每个节拍标注时间码：
1. 钩子 (0-5s)：模式中断型开头，用出人意料的画面+一句话抓住观众
2. 建置 (5-15s)：快速揭示主角处境+今天的"反常"
3. 冲突升级 (15-45s)：障碍从弱到强，主角一次次被逼退
4. 反转/高潮 (45-70s)：颠覆观众认知的一刻，情绪爆发
5. 留白结尾 (70-90s)：用一句话/一个画面留悬念，引导"下集"

要求每30秒至少有一个情绪转折点。

【第四步：风格约束】
- 语言必须口语化，每句对白不超过15个字
- 不要出现"AI腔"：比如"让我们回顾""标志性的是""在这个过程中"等
- 对白推动剧情或揭示性格，不做单纯说明
- 参考语气：朋友之间说悄悄话的感觉

【第五步：输出格式】
请以标准剧本格式输出，包含：
- 每场戏的场景标题（地点/时间）
- 角色动作描述（具体的外部动作，不能是心里描写）
- 对白
- [画外音/旁白标注]
- [关键镜头建议（景别+运镜）]
- [音效/氛围提示]

同时附带每个角色的人物设定描述（外貌、服装、性格特征）</div>
</div>

<hr style="border:none;border-top:1px solid var(--border);margin:32px 0;">

<h2 style="font-size:1.15rem;margin-bottom:16px;">🤝 模块七：人机协作工作流 — AI 不是替你写，是帮你写</h2>

<p style="font-size:0.9rem;color:var(--text-secondary);margin-bottom:12px;">把剧本从头到尾全丢给 AI = 得到一坨废话。正确的做法是分步协作，每一步都由你来把关质量。</p>

<div class="data-table-wrapper">
<table>
<thead><tr><th>步骤</th><th>谁做</th><th>做什么</th></tr></thead>
<tbody>
<tr><td><strong>1. 竞品研究</strong></td><td>你+AI</td><td>用AI分析"抖音上最近30天最火的AI漫剧，总结它们的共同规律"</td></tr>
<tr><td><strong>2. 创意头脑风暴</strong></td><td>AI</td><td>让AI生成10个不同角度的故事大纲，你选最有感觉的一个</td></tr>
<tr><td><strong>3. 写钩子</strong></td><td>👤 你</td><td>你亲手写出前3秒的钩子画面+台词——这是AI最弱的地方</td></tr>
<tr><td><strong>4. 剧本初稿</strong></td><td>AI</td><td>用上面的五步提示词，让AI基于你的钩子扩展出完整剧本</td></tr>
<tr><td><strong>5. 精修</strong></td><td>👤 你</td><td>读一遍，把"AI味"的句子改成口语，删掉逻辑跳跃，调整节奏</td></tr>
<tr><td><strong>6. 分镜转换</strong></td><td>AI</td><td>把精修后的剧本发给AI："按以下格式拆成15-25个分镜……"</td></tr>
<tr><td><strong>7. 分镜检查</strong></td><td>👤 你</td><td>检查分镜的节奏感（景别搭配是否单调、有没有全中景的问题）</td></tr>
</tbody>
</table>
</div>

<hr style="border:none;border-top:1px solid var(--border);margin:32px 0;">

<h2 style="font-size:1.15rem;margin-bottom:16px;">🗣️ 模块八：如何避免"AI味"</h2>

<p style="font-size:0.9rem;color:var(--text-secondary);margin-bottom:12px;">AI 生成的剧本有一个致命问题——读起来不像人说的话。观众听到"在这个过程中，我深刻意识到了……"这种台词，一秒就会划走。</p>

<div class="data-table-wrapper">
<table>
<thead><tr><th style="width:50%">❌ AI味的写法</th><th style="width:50%">✅ 人味的改法</th></tr></thead>
<tbody>
<tr><td>"在这个关键时刻，我做出了一个改变我一生的决定。"</td><td>"就现在。赌一把。"</td></tr>
<tr><td>"他的眼神中透露出一丝不易察觉的忧伤。"</td><td>"他别过脸去。"</td></tr>
<tr><td>"经过这段时间的相处，我们的关系发生了质的变化。"</td><td>"他给我倒了杯水。第一次。"</td></tr>
<tr><td>"这是一个标志性的时刻，预示着我们团队的新篇章。"</td><td>"从今天起，这里我说了算。"</td></tr>
<tr><td>"让我们回顾一下过去发生的一切……"</td><td>"你还记得那天吗？"</td></tr>
</tbody>
</table>
</div>

<h4 style="font-size:0.95rem;margin:16px 0 8px;">去AI味的五个技巧</h4>
<ol style="padding-left:20px;color:var(--text-secondary);font-size:0.9rem;line-height:2.2;">
  <li><strong>每句对白不超过15个字</strong> — 超过就拆成两句，或者删掉废话</li>
  <li><strong>把「形容词」换成「动作」</strong> — 不写"他很感动"，写"他别过脸，抬手揉了揉眼睛"</li>
  <li><strong>删掉所有「标志性」「里程碑」「过程中」</strong> — 这些词是AI味的核心信号</li>
  <li><strong>把书面语改成口语</strong> — "为何"→"为什么"，"或许"→"也许"，"如此"→"这么"</li>
  <li><strong>大声读一遍</strong> — 如果你读不出来/读得别扭/读起来不像正常人说的话，就改写</li>
</ol>

<hr style="border:none;border-top:1px solid var(--border);margin:32px 0;">

<h2 style="font-size:1.15rem;margin-bottom:16px;">📜 模块九：完整剧本范例（60秒·重生逆袭题材）</h2>

<p style="font-size:0.9rem;color:var(--text-secondary);margin-bottom:12px;">下面是一个可以直接参考的完整剧本，标注了每个节拍的时间码和设计意图。你可以用这个模板来写自己的剧。</p>

<div class="prompt-block">
  <div class="prompt-header"><span>🎬 《重生之高考前一天》第1集·完整剧本</span><button class="copy-btn" onclick="copyPrompt(this)">📋 复制</button></div>
  <div class="prompt-content">=== 第1集：睁开眼，我在高考前一天 ===

[0-3s HOOK · 全景 · 镜头快速推进]
【场景：一间凌乱的高中生卧室，墙上贴着高考倒计时：1天】
女主陆薇（18岁，马尾辫，校服）猛然从书桌前惊醒，瞳孔剧烈收缩。
她低头看了看自己的手——皮肤白皙、指节完好。
她的声音颤抖：不对……这不对。我的手上应该有烧伤的疤。
画外音（女主内心，低沉）：我死过一次。在工厂的火灾里。那是……十年后的事。

[3-8s · 近景 → 特写 · 固定镜头]
陆薇疯狂地翻桌上的日历、手机、准考证——所有证据都在告诉她：今天真的是高考前一天。
她怔怔地看着镜中的自己：十八岁。瘦弱。满脸青春痘。和记忆中那个被工厂机器磨出满手老茧、被烟熏哑嗓子的三十岁女人判若两人。
特写：她攥紧准考证，指节发白。
她的眼睛从迷茫转为一种近乎可怕的冷静。

[8-20s · 中景 · 跟镜头]
陆薇站起身，推开卧室门。客厅传来熟悉的声音——她妈妈在打电话。
（画外音，回忆杀）：十年前，她高考发挥失常，去了一个烂大专。毕业后找不到工作，进了一个血汗工厂。十年后死在一场火灾里，新闻只占了报纸角落的三行字。
陆薇（内心，冰冷）：这一次，我不要那三行字。

  <p><strong>AI 没有记忆。</strong>你上一张图生成一个黑发红裙的女孩，下一张它完全不记得她长什么样。不做角色设计的后果：第一幕瓜子脸→第二幕圆脸（弹幕"这谁？"）、衣服颜色每镜在变（"换装秀？"）、发型飘忽不定（"发型比剧情变化还快"）→ 观众直接弃剧。</p>

<tr><td><strong>脸盲症</strong></td><td>每张图长得不一样</td><td>参考图未上传/权重不够</td><td>确认参考图已上传；减少发型变化描述；在提示词开头重复角色名</td></tr>

<h4 style="font-size:0.95rem;margin:16px 0 8px;">种子（Seed）控制</h4>
<p style="font-size:0.9rem;color:var(--text-secondary);">生成满意的第一张场景图后<strong>记录Seed值</strong>，生成同场景其他镜头时使用相同Seed，<strong>只改角色描述和镜头角度</strong>。如果工具不支持Seed（如即梦免费版），用<strong>复制粘贴相同场景母代码</strong>来替代。</p>

<h4 style="font-size:0.95rem;margin:16px 0 8px;">多视角底图库</h4>
<p style="font-size:0.9rem;color:var(--text-secondary);">提前为每个场景生成 全景+中景+细节 三组底图，后续所有同场景镜头都有明确参考。</p>

<h4 style="font-size:0.95rem;margin:16px 0 8px;">🌐 三大光源铁律</h4>
<ol style="padding-left:20px;color:var(--text-secondary);font-size:0.9rem;line-height:2.2;">
  <li><strong>主光永远有方向</strong> — 禁用平光。写清楚光从哪边来。</li>
  <li><strong>角色边缘必须有1-2像素轮廓光</strong> — 逆光勾边，把人从背景中"拉"出来。</li>
  <li><strong>环境光与场景色调一致</strong> — 冷蓝场景补冷蓝光，暖黄场景补暖黄光。</li>
</ol>

  step4: { number:'04',icon:'🎬',title:'分镜脚本 — 从写手变导演',label:'从写手变导演',
    content:`
<div class="step-hero"><div class="step-number">🎬 04</div><div class="step-title">分镜脚本 — 从"写故事的人"变成"导演"</div><div class="step-subtitle">分镜的本质是"引导观众的视线"——用一个一个画面讲出有节奏感的故事。镜头数量计算公式：总字数÷30×0.8。</div></div>
<div class="explain-block what"><h4>🔍 每个镜头必须包含 8 个要素</h4><p>景别、运镜、主角、动作、台词、音效、光影、场景。缺一个都可能出问题。</p></div>
<h4 style="margin:20px 0 12px;font-size:0.95rem;">📷 景别——用手机拍照来理解</h4>
<div class="data-table-wrapper"><table><thead><tr><th>术语</th><th>大白话</th><th>范围</th><th>用在哪</th></tr></thead><tbody>
<tr><td><strong>大远景</strong></td><td>站超远眺望</td><td>人像蚂蚁</td><td>开头/结尾</td></tr>
<tr><td><strong>全景</strong></td><td>站得远</td><td>全身</td><td>角色登场</td></tr>
<tr><td><strong>中景</strong></td><td>正常交谈</td><td>膝盖以上</td><td>最常用，占一半以上</td></tr>
<tr><td><strong>近景</strong></td><td>面对面</td><td>胸部以上</td><td>情绪表达</td></tr>
<tr><td><strong>特写</strong></td><td>怼脸拍</td><td>脸/某件东西</td><td>哭/笑/关键道具</td></tr>
</tbody></table></div>
<div class="golden-box"><strong>黄金配比</strong><br><span style="color:var(--text-secondary);">全景 30% + 中景 50% + 特写 20% = 最有呼吸感</span></div>
<h4 style="margin:20px 0 12px;font-size:0.95rem;">🎥 运镜</h4>
<div class="data-table-wrapper"><table><thead><tr><th>术语</th><th>大白话</th><th>AI提示词</th></tr></thead><tbody>
<tr><td><strong>推镜头</strong></td><td>从远走近</td><td><code>camera slowly push in</code></td></tr>
<tr><td><strong>拉镜头</strong></td><td>从近退远</td><td><code>camera slowly pull out</code></td></tr>
<tr><td><strong>摇镜头</strong></td><td>头左右转</td><td><code>pan left/right</code></td></tr>
<tr><td><strong>跟镜头</strong></td><td>跟着走</td><td><code>tracking shot, follow</code></td></tr>
<tr><td><strong>固定镜头</strong></td><td>完全不动</td><td><code>static shot</code></td></tr>
</tbody></table></div>
<h4 style="margin:20px 0 12px;font-size:0.95rem;">🔥 一句话拆成8个镜头</h4>
<p style="font-size:0.88rem;color:var(--text-secondary);">「男主向女主表白」→ 大远景(夜景)→全景(路灯下)→中景(递花)→特写(紧张的脸)→细节特写(发抖手指)→过肩(看女主)→主观视角(女主接花)→近景(嘴角微扬)。<strong>一个动作=一个镜头</strong></p>
<div class="tip-card warning"><span class="tip-icon">⚠️</span><span>新手最常犯的错：一个镜头塞两个动作。比如一个人又走路又挥手又说话又说旁白——拆开！每个镜头只讲一件事。</span></div>
`},

  step5: { number:'05',icon:'🖼️',title:'批量生图 — 把分镜变成画面',label:'文字变成画面',
    content:`

  step8: { number:'08',icon:'✂️',title:'剪辑合成 — 把所有东西拼在一起',label:'拼成一部剧',

<li><strong>导入配音</strong> — 对口型，偏差不超过0.2s</li>
<li><strong>音量分层</strong> — 按上一步的混音公式</li>
<li><strong>加字幕</strong> — 剪映智能字幕，思源黑体，字号18-22</li>
<li><strong>统一调色</strong> — 色温/饱和度/对比度/锐化，同场景复制粘贴</li>

<tr><td>对比度</td><td>+5~+10</td><td>增加立体感</td></tr>

/* ============================================
   MARKDOWN LOADER — Dynamic content from Obsidian Vault
   ============================================ */

// Configuration: path to Obsidian vault (relative or absolute)
const VAULT_BASE = '../../Obsidian下载/AI manju';  // relative path from ai-manhua-guide to vault
const USE_DYNAMIC_MD = false;        // SET TO TRUE when serving via HTTP server with vault accessible

// Map step IDs to vault markdown files
const MD_MAP = {
  step1: '01_剧本创作/README.md',
  step2: '02_角色设计/README.md',
  step3: '03_场景设计/README.md',
  step4: '04_分镜脚本/README.md',
  step5: '05_批量生图/README.md',
  step6: '06_图生视频/README.md',
  step7: '07_配音音效/README.md',
  step8: '08_剪辑合成/README.md',
  step9: '09_发布运营/README.md',
  tools: '10_参考资料/README.md',
  bugs: '10_参考资料/README.md',
  resources: '10_参考资料/README.md',
};

/**
 * Simple Markdown-to-HTML converter.
 * Converts Obsidian-flavored markdown to styled HTML.
 */
function mdToHtml(md) {
  if (!md) return '<p>内容加载失败，请检查文件路径。</p>';

  // Remove YAML frontmatter
  md = md.replace(/^---[\s\S]*?---\n*/, '');

  let html = md;

  // Wiki links [[path|label]] or [[path]]
  html = html.replace(/\[\[([^\]|]+)\|([^\]]+)\]\]/g, '<a href="#$1" class="wiki-link">$2</a>');
  html = html.replace(/\[\[([^\]]+)\]\]/g, '<a href="#$1" class="wiki-link">$1</a>');

  // Code blocks ```
  html = html.replace(/```(\w*)\n([\s\S]*?)```/g, (_,lang,code) => {
    return '<div class="prompt-block"><div class="prompt-header"><span>'+(lang||'code')+'</span><button class="copy-btn" onclick="copyPrompt(this)">📋 复制</button></div><div class="prompt-content">'+escapeHtml(code.trim())+'</div></div>';
  });

  // Inline code
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');

  // Headers
  html = html.replace(/^#### (.+)$/gm, '<h4 style="font-size:0.95rem;margin:16px 0 8px;">$1</h4>');
  html = html.replace(/^### (.+)$/gm, '<h3 style="font-size:1.05rem;margin:20px 0 10px;color:var(--accent-glow);">$1</h3>');
  html = html.replace(/^## (.+)$/gm, '<h2 style="font-size:1.15rem;margin:24px 0 12px;border-bottom:1px solid var(--border);padding-bottom:8px;">$1</h2>');
  html = html.replace(/^# (.+)$/gm, '<h1 style="font-size:1.3rem;margin:24px 0 12px;">$1</h1>');

  // Blockquotes
  html = html.replace(/^> (.+)$/gm, '<div class="tip-card tip"><span class="tip-icon">💡</span><span>$1</span></div>');
  html = html.replace(/^> ⚠️ (.+)$/gm, '<div class="tip-card warning"><span class="tip-icon">⚠️</span><span>$1</span></div>');
  html = html.replace(/^> ✅ (.+)$/gm, '<div class="tip-card success"><span class="tip-icon">✅</span><span>$1</span></div>');

  // Bold and italic
  html = html.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');

  // Horizontal rules
  html = html.replace(/^---$/gm, '<hr style="border:none;border-top:1px solid var(--border);margin:24px 0;">');

  // Tables: detect |---| pattern and wrap
  let lines = html.split('\n');
  let result = [];
  let inTable = false;
  let tableRows = [];
  let isHeader = false;

  for (let i = 0; i < lines.length; i++) {
    const line = lines[i].trim();
    if (line.startsWith('|') && line.endsWith('|')) {
      if (!inTable) { inTable = true; tableRows = []; isHeader = true; }
      if (line.match(/^\|[\s\-:|]+\|$/)) { isHeader = false; continue; } // separator row
      const cells = line.split('|').filter(c => c.trim()).map(c => c.trim());
      tableRows.push({ cells, isHeader });
      isHeader = false;
    } else {
      if (inTable) {
        // Flush table
        let tbl = '<div class="data-table-wrapper"><table>';
        tableRows.forEach((row, ri) => {
          const tag = row.isHeader ? 'th' : 'td';
          tbl += '<tr>';
          row.cells.forEach(c => {
            tbl += '<'+tag+'>'+c+'</'+tag+'>';
          });
          tbl += '</tr>';
        });
        tbl += '</table></div>';
        result.push(tbl);
        inTable = false; tableRows = [];
      }
      result.push(line);
    }
  }
  // Flush remaining table
  if (inTable && tableRows.length > 0) {
    let tbl = '<div class="data-table-wrapper"><table>';
    tableRows.forEach(row => {
      const tag = row.isHeader ? 'th' : 'td';
      tbl += '<tr>';
      row.cells.forEach(c => { tbl += '<'+tag+'>'+c+'</'+tag+'>'; });
      tbl += '</tr>';
    });
    tbl += '</table></div>';
    result.push(tbl);
  }

  html = result.join('\n');

  // Ordered lists
  html = html.replace(/^(\d+)\. (.+)$/gm, '<li value="$1">$2</li>');
  // Wrap consecutive <li> in <ol>
  html = html.replace(/(<li[\s\S]*?<\/li>)\n(?!<li)/g, '$1</ol>\n');
  html = html.replace(/(?<!<\/ol>\n)(<li)/g, '<ol style="padding-left:20px;color:var(--text-secondary);font-size:0.9rem;line-height:2.2;">\n$1');

  // Unordered lists
  html = html.replace(/^- (.+)$/gm, '<li>$1</li>');
  html = html.replace(/(<li[\s\S]*?<\/li>)\n(?!<li)/g, '$1</ul>\n');
  html = html.replace(/(?<!<\/ul>\n)(<li)/g, '<ul style="padding-left:20px;color:var(--text-secondary);font-size:0.9rem;line-height:2.2;">\n$1');

  // Paragraphs: wrap non-tag lines
  html = html.replace(/^(?!<[a-z/!]|$)(.+)$/gm, '<p style="font-size:0.9rem;color:var(--text-secondary);margin:8px 0;">$1</p>');

  return html;
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/**
 * Load markdown content from Obsidian vault file.
 * Falls back to inline STEP content if dynamic loading fails or is disabled.
 */
async function loadMdContent(stepId) {
  if (!USE_DYNAMIC_MD || !MD_MAP[stepId]) return null;

  const mdPath = VAULT_BASE + '/' + MD_MAP[stepId];
  try {
    const resp = await fetch(mdPath);
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const md = await resp.text();
    const html = mdToHtml(md);
    if (html && html.trim().length > 0) return html;
    throw new Error('MD converted to empty HTML');
  } catch(e) {
    console.warn('⚠️ MD fetch failed for ' + stepId + ', using inline fallback. Error: ' + e.message);
    return null;
  }
}

/* ============================================
   ROUTING (with dynamic MD support)
   ============================================ */
let currentStepId = 'step1';

async function renderPage(stepId){
  const step = STEPS[stepId];
  if(!step){ navigateTo('step1'); return; }
  currentStepId = stepId;

  // Try dynamic MD loading first, fall back to inline HTML
  const mdHtml = await loadMdContent(stepId);
  const contentHtml = mdHtml || step.html;

  // Update main content
  document.getElementById('mainContent').innerHTML = contentHtml;
  document.getElementById('mainContent').classList.remove('page-content');
  void document.getElementById('mainContent').offsetWidth;
  document.getElementById('mainContent').classList.add('page-content');

  // Update labels
  document.getElementById('currentStepLabel').textContent = `第${step.number}步`;
  document.getElementById('currentStepTitle').textContent = '— ' + step.title.split(' — ')[0];

  // Update sidebar active
  document.querySelectorAll('.sidebar a').forEach(a=>{
    a.classList.toggle('active', a.dataset.id === stepId);
  });

  // Update dots
  document.querySelectorAll('.step-dots .dot').forEach(d=>{
    d.classList.toggle('active', d.dataset.index === String(SIDEBAR_ITEMS.findIndex(s=>s.id===stepId)));
  });

  // Update nav buttons
  const idx = SIDEBAR_ITEMS.findIndex(s=>s.id===stepId);
  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');
  const bottomPrev = document.getElementById('bottomPrev');
  const bottomNext = document.getElementById('bottomNext');
  prevBtn.disabled = idx === 0;
  nextBtn.disabled = idx === SIDEBAR_ITEMS.length - 1;
  bottomPrev.disabled = idx === 0;
  bottomNext.disabled = idx === SIDEBAR_ITEMS.length - 1;

  // Scroll to top of content
  document.querySelector('.main-wrap').scrollIntoView({behavior:'smooth'});
  window.scrollTo({top:0, behavior:'smooth'});

  // Re-bind copy buttons in new content
  bindCopyButtons();

  // Update URL hash
  if(location.hash !== '#'+stepId){
    history.replaceState(null,null,'#'+stepId);
  }
}

function navigateTo(stepId){
  renderPage(stepId);
  // Close mobile sidebar
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('open');
}

function navigatePrev(){
  const idx = SIDEBAR_ITEMS.findIndex(s=>s.id===currentStepId);
  if(idx>0) navigateTo(SIDEBAR_ITEMS[idx-1].id);
}
function navigateNext(){
  const idx = SIDEBAR_ITEMS.findIndex(s=>s.id===currentStepId);
  if(idx<SIDEBAR_ITEMS.length-1) navigateTo(SIDEBAR_ITEMS[idx+1].id);
}

/* ============================================
   COPY BUTTONS
   ============================================ */
function bindCopyButtons(){
  document.querySelectorAll('.copy-btn').forEach(btn=>{
    btn.addEventListener('click', function(){
      const block = this.closest('.prompt-block');
      const content = block.querySelector('.prompt-content').textContent;
      navigator.clipboard.writeText(content).then(()=>{
        this.textContent='✅ 已复制';this.classList.add('copied');
        setTimeout(()=>{this.textContent='📋 复制';this.classList.remove('copied');},2000);
      }).catch(()=>{
        this.textContent='❌ 失败';
        setTimeout(()=>{this.textContent='📋 复制';},2000);
      });
    });
  });
}

   EVENT LISTENERS
   ============================================ */

document.getElementById('sidebar').addEventListener('click',e=>{
